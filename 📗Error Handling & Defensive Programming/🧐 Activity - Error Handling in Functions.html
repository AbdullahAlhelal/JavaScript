  <body>
    <script>
      //Task 1
      //Create a function safeDivide(a, b) Handle division by zero inside the function and return null.

      function safeDivide(a, b) {
        if (b === 0) return null;

        return a / b;
      }

      console.log(safeDivide(4, 2));

      //Task 2
      //Create a function getUserName(user)
      //Throw an error if user.name is missing.

      function getUserName(user) {
        if (!user || !user.name) {
          throw new Error("User name is required");
        }
        document.write("<p> " + user.name + " </p>");
      }

      const user = { name: "", password: "123" };

      //    Task 3
      //Create a function that catches an error, logs it, and rethrows it.

      function processData(data) {
        try {
          if (!data) {
            throw new Error("No data");
          }
        } catch (err) {
          console.log("Processing failed");
          throw err; // rethrow
        }
      }

      //    Task 4
      //Design a defensive function that validates two parameters before using them.

      function multiply(a, b) {
        if (typeof a !== "number" || typeof b !== "number") {
          throw new TypeError("Both arguments must be numbers");
        }
        return a * b;
      }
    </script>
