<!DOCTYPE html>

    <title>Activity - Validations vs Errors</title>

  <body>
    <script>
      //        Task 1
      //Write a function register(username) that:
      //
      //🔹 Returns "Invalid username" if empty
      //🔹 Returns "Registered" if valid

      function register(username) {
        if (username === "" || !username) {
          return "Invalid username";
        }
        return "Registered";
      }
      document.write("<p>" + register() + "</p>");

      //       Task 2
      //Create a function transfer(balance, amount) that:
      //🔹 Uses guard clauses
      //🔹 Throws an error if amount is negative
      function transfer(balance, amount) {
        if (amount < 0) {
          throw new Error("Negative amount not allowed");
        }
        if (amount > balance) return "Insufficient funds";
        return balance - amount;
      }

      //      Task 3
      //Decide: validation or error?

      //🔹 Invalid email format
      //🔹 Missing API key
      //🔹 User enters age as text

      //            ✔ Solution 3
      //
      //      Invalid email → Validation
      //      Missing API key → Error
      //      Age as text → Validation
      //

      //✔ Solution 4

      function login(user) {
        if (!user) return "Access denied";
        if (!user.active) return "Access denied";
        return "Welcome";
      }
