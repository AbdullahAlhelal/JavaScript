<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧐 Activity – Fetch API Basics</title>
  </head>

  <body>
    <script>
      fetch("https://random.dog/ddb3f140-f7d6-4aa1-867a-61f3d261f085.gif")
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response
            .json()
            .finally(console.log(response.body.getReader().read()));
        })
        .then((data) => console.log(data))
        .catch((error) => console.error("Fetch failed:", error));
    </script>
  </body>
</html>
