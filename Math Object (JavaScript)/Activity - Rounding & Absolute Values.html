<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Task 1
      //Round the number 6.7 using Math.round()

      const num1 = Math.round(6.7);
      console.log(num1);

      //       Task 2
      // Always round down the number 9.9.
      const num2 = Math.floor(9.9);
      console.log(num2);

      //      Task 3
      //Always round up the number 2.1.
      let num3 = Math.ceil(2.1);
      console.log(num3);
      //Task 4
      //Remove the decimal part from -8.75 without rounding.
      let num4 = Math.trunc(-8.75);
      console.log(num4);
      //Task 5
      //Convert -45 into a positive number.
      let num5 = Math.abs(-45);
      console.log(num5);
    </script>
  </body>
</html>
