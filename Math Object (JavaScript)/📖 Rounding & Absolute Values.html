<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //✔ Math.round()
      //✔ Math.floor()
      //✔ Math.ceil()
      //✔ Math.trunc()
      //✔ Math.abs()

      //      1️⃣ Math.round() — Round to Nearest Integer
      //🔹 Rounds a number to the nearest integer
      //🔹 .5 and above → rounds up
      //🔹 Below .5 → rounds down

      console.log(Math.round(4.4));
      console.log(Math.round(4.5));
      //2️⃣ Math.floor() — Always Round Down
      //🔹 Rounds down to the nearest integer
      //🔹 Works the same for positive and negative numbers

      console.log(Math.floor(4.9));
      console.log(Math.floor(-4.1));
      //3️⃣ Math.ceil() — Always Round Up
      //🔹 Rounds up to the nearest integer

      console.log(Math.ceil(4.1));
      console.log(Math.ceil(-4.9));
      //4️⃣ Math.trunc() — Remove the Decimal Part
      //🔹 Removes everything after the decimal
      //🔹 Does not round — just cuts

      console.log(Math.trunc(4.9));
      console.log(Math.trunc(-4.9));

      //5️⃣ Math.abs() — Absolute Value
      //  🔹 Removes the negative sign
      //  🔹 Always returns a positive number or zero

      console.log(Math.abs(-10));
      console.log(Math.abs(10));
    </script>
  </body>
</html>
