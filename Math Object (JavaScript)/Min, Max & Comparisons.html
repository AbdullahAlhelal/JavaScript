<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //1️⃣ Math.min() — Find the Smallest Value
      console.log(Math.min(5, 3, 9, 1));
      //2️⃣ Math.max() — Find the Largest Value
      console.log(Math.max(5, 3, 9, 1));
      //3️⃣ Using Spread (...) with Math.min & Math.max
      const scores = [88, 92, 75, 100, 67];

      console.log(Math.min(...scores));
      console.log(Math.max(...scores));
      //4️⃣ Real-World Examples
      const grades = [70, 85, 90, 60];
      console.log("Lowest:", Math.min(...grades));
      console.log("Highest:", Math.max(...grades));
      //✔ Example 2 — Product Price Comparison
      const prices = [19.99, 9.99, 25.5, 15];

      let cheapest = Math.min(...prices);
      let expensive = Math.max(...prices);

      console.log("Cheapest:", cheapest);
      console.log("Most Expensive:", expensive);
      //✔ Example 3 — Limit Validation
      let userAge = 17;
      let minAge = 18;

      console.log(userAge >= minAge);
    </script>
  </body>
</html>
