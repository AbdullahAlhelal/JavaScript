<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📖 Rare but Important JavaScript Operators</title>
  </head>
  <body>
    <!-- 
    🗝️ Introduction
In JavaScript, some operators are not commonly used in everyday programming—but they are extremely important in certain situations.

These “rare but essential” operators include:

1️⃣ delete → remove object properties

2️⃣ in → check if a property exists

3️⃣ void → ignore a value (force undefined)

4️⃣ Comma operator → run multiple expressions in a single statement

Although uncommon, understanding them will help you debug code, read advanced JS, and work with frameworks that rely on them (React, Vue, internal JS engines, etc.).
     -->
    <script>
      //1️⃣ delete Operator
      //🧬 What it does:
      ////Removes a property from an object.
      ////Syntax

      //delete object.property
      //delete object["property"]

      //✔ Example: Delete a property

      let user = {
        name: "Mohammed",
        age: 30,
      };

      delete user.age;

      console.log(user);
      // { name: "Mohammed" }

      //✔ Delete array elements (rarely recommended)

      let nums = [10, 20, 30];
      delete nums[1];

      console.log(nums);
      // [10, empty, 30]
      //⚠️ delete does not shrink arrays. It leaves a hole (empty).

      //✔ delete cannot remove variables created with let/const

      let x = 5;
      delete x; // false — does NOT delete

      //2️⃣ in Operator
      //🧬 What it does:
      //
      //Checks whether a property exists inside an object (even if its value is undefined).
      //
      //Syntax
      //
      //"property" in object
      //✔ Example: Check if property exists

      let user1 = { name: "Ali", age: 22 };

      console.log("name" in user1); // true
      console.log("salary" in user1); // false
      //✔ Example: Value is undefined but property exists

      let obj = { x: undefined };

      console.log("x" in obj); // true
      console.log(obj.x); // undefined

      //Important difference:

      //"x" in obj → checks existence
      //obj.x → returns value

      //✔ in with arrays

      let arr = [10, 20];

      console.log(1 in arr); // true (index exists)
      console.log(5 in arr); // false

      //3️⃣ void Operator
      //🧬 What it does:
      //
      //Evaluates an expression and always returns undefined—discarding the actual result.
      //
      //Syntax
      //
      //void expression

      //✔ Example: Ignore result of a function

      function getValue() {
        return 42;
      }

      console.log(void getValue());
      // undefined

      //✔ Another use case: Force undefined

      //let result = void (2 + 2);

      //console.log(result);
      // undefined

      //4️⃣ Comma Operator ,
      //🧬 What it does:
      //
      //Evaluates multiple expressions from left to right, returning the value of the last expression.
      //
      //Syntax
      //
      //(expr1, expr2, expr3)
      let xexpr = (1 + 2, 5 + 5);

      console.log(xexpr); 
      // 10 (result of last expression)
      //✔ Comma in assignments

        let a, b;

        a = (b = 5, b + 10);

        console.log(a); // 15

     //   🔗 Interconnections
     //🔹 delete + in are often used together:

    if ("token" in session) {
        delete session.token;
}
      
    </script>
    
    ✔ Real use case: Prevent browser navigation on <a> links

    <a href="javascript:void(0)">Click</a>

  </body>
</html>
