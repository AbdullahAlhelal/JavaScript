    <script>
      //        Exercise 1 — Spread Operator
      //Create an array of numbers and:
      //
      //Copy the array
      //Add extra numbers using spread
      //Merge it with another array

      let nums = [1, 2, 3];
      let copy = [...nums];
      let extended = [...nums, 4, 5];
      let merged = [...nums, ...extended];

      console.log("Copy ->", copy);
      console.log("Extended ->", extended);
      console.log("Merged ->", merged);
