<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📖 Setting Date Values</title>
  </head>
  <body>
    <script>
      //1️⃣ setFullYear(year)
      //Sets the year of the date.

      const d = new Date("2023-01-01");
      d.setFullYear(2025);

      console.log(d);

      //      2️⃣ setMonth(monthIndex)
      //Sets the month (0–11).

      d.setMonth(3);

      console.log(d.getMonth() + 1);

      //3️⃣ setDate(day)
      //Sets the day of the month (1–31).

      d.setDate(20);

      console.log(d.getDate());
      //4️⃣ setHours(hours)
      //Sets the hour (0–23).
      d.setHours(15);

      console.log(d.getHours());
    </script>
  </body>
</html>
