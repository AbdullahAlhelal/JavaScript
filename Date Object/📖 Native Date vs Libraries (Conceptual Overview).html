<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>📖 Native Date vs Libraries (Conceptual Overview)</title>
  </head>

  <body>
    <script>
        
      //        1️⃣ Native Date — Strengths
      //JavaScript’s Date object is built into the language.
      //
      //✅ Strengths of Native Date
      //✔ Zero dependencies
      //✔ Works in all browsers and environments
      //✔ Handles timestamps accurately
      //✔ Good for:
      //
      //Getting current date/time
      //Comparing dates
      //Adding/subtracting time
      //Simple formatting
      //Business logic with care
      //✔ Examples
      //
      const now = new Date();
      console.log(now);
      //
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);

      console.log(tomorrow > now); // true

      //      2️⃣ Native Date — Limitations
      //Native Date becomes difficult when working with real-world complexity.
      //
      //❌ Limitations of Native Date
      //❌ Confusing API
      //❌ Months are zero-based (0 = January)
      //❌ Mutates objects by default
      //❌ Formatting is awkward
      //❌ Time zone handling is painful
      //❌ DST (Daylight Saving Time) issues
      //❌ No built-in date difference helpers
      //❌ No immutable operations

      // ⚠️ Example of Confusion
      //new Date(2025, 1, 1); // February 1, NOT January

      //      4️⃣ moment.js — Legacy Mention
      //🕰️ What is moment.js?
      //moment.js was once the most popular date library.
      //
      //❌ Why It’s Legacy Now
      //❌ Large bundle size
      //❌ Mutable API
      //❌ Performance issues
      //❌ Officially marked as legacy
      //
      //📌 Important:
      //
      //Moment.js is NOT recommended for new projects.
      //It’s still found in old codebases — you should recognize it, not adopt it.

      //        5️⃣ Modern Libraries Overview
      //  🌟 date-fns
      //  A modern, lightweight utility library.
      //
      //  ✔ Functional style
      //  ✔ Immutable
      //  ✔ Tree-shakeable
      //  ✔ Uses native Date underneath

      //Example (conceptual):

      addDays(now, 5);
      addhours(now, 1);
      format(now, "yyyy-MM-dd");

      //🌍 Luxon
      //Built by the Moment.js team as a modern replacement.
      //
      //✔ Immutable
      //✔ First-class timezone support
      //✔ Clear API
      //✔ Built on Intl standards
      //
      //Example (conceptual):


      const now1 = DateTime.now().setZone("Europe/Amsterdam");
      const result = now1.plus({ days: 5 });

      console.log(result.toString());
      DateTime.now().setZone("Europe/Paris");
    </script>
  </body>
</html>
