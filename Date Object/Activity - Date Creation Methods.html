<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Task 1
      //Create a Date object representing the current date and time.
      let datenow = new Date();
      console.info(datenow);
      //Task 2
      //Create a Date object using milliseconds = 0.
      let datemilliseconds = new Date(0);
      console.info(datemilliseconds);

      //    Task 3
      //Create a Date object from a date string "2000-01-01".
      let datestring = new Date("2000-01-01");
      console.info(datestring);
      //    Task 4
      //Create a Date object for December 25, 2025 using numbers.
      const christmas = new Date(2025, 11, 25);
      console.log(christmas);

      //   Task 5
      //Create a Date object for July 10, 2024 at 8:45 AM.
      const meeting = new Date(2024, 6, 10, 8, 45);
      console.log(meeting);
      
    </script>
  </body>
</html>
