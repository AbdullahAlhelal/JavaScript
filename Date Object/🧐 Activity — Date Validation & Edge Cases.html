<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //✔ Solution 1

      function isValidDate(date) {
        return date instanceof Date && !Number.isNaN(date.getTime());
      }
      //✔ Solution 2

      const d1 = new Date("2024-02-29");
      console.log(isValidDate(d1));
      //✔ Solution 3

      const d2 = new Date("2023-02-29");
      console.log(isValidDate(d2));
      //✔ Solution 4

      const d = new Date(2024, 1, 31);
      console.log(d.toDateString());
      //✔ Solution 5

      const d23 = new Date(2024, 0, 31);
      d23.setDate(d23.getDate() + 1);
      console.log(d23.toDateString());
    </script>
  </body>
</html>
