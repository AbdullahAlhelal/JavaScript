<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Task 1
      //Print the values of Math.PI and Math.E.
      console.log(Math.PI);
      console.log(Math.E);

      //Task 2
      //Calculate the sine of 90 degrees.
      let radians = 90 * (Math.PI / 180);
      console.log(Math.sin(radians));

      //Task 3
      //Calculate the cosine of 60 degrees.
      let radians60 = 60 * (Math.PI / 180);
      console.log(Math.cos(radians60));
      // Task 4
      // Calculate the tangent of 45 degrees.
      let radians45 = 45 * (Math.PI / 180);
      console.log(Math.tan(radians45));

      //Task 5
      //Convert 180 degrees to radians and print the result.
      let radians180 = 180 * (Math.PI / 180);
      console.log(radians180);
      
    </script>
  </body>
</html>
