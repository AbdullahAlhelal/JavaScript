      //Create a class Car with instance properties:
      //
      //brand
      //speed
      //Add a method drive() that prints the current speed.

      class clsCar {
        constructor(brand, speed) {
          this.brand = brand;
          this.speed = speed;
        }
        drive() {
          document.write(`<h1>  ${this.speed}</h1>`);
        }

        drive(amount) {
          this.speed += amount;
        }
      }
