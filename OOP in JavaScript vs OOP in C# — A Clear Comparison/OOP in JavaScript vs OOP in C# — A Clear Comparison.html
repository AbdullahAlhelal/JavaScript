<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OOP in JavaScript vs OOP in C# — A Clear Comparison</title>
  </head>
  <body>
    <script>
      class User {
        constructor(name) {
          this.name = name;
        }
      }

      class Account {
        #balance = 0; // private field (modern JS)
      }

      //🔁 Inheritance & Polymorphism
      JavaScript;
      class Admin extends User {}

      //    🧠 Method Overloading
      //C#
      //void Print(int x) {}
      //void Print(string s) {}
      //
      //✔ Supported
      //✔ Type-safe

      JavaScript;
      function print(x) {}
      function print(x, y) {} // overrides previous

      //❌ No real overloading
      //❌ Manual checks required
    </script>
  </body>
</html>
