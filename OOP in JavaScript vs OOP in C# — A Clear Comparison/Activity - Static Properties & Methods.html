<!DOCTYPE html>
<html lang="en">

    <title>🧐 Activity - Static Properties & Methods</title>

  <body>
    <script>
      //        Task 1
      //Create a class Calculator with:
      //
      //A static method add(a, b)
      class Calculator {
        static add(a, b) {
          return a + b;
        }
        //        Task 2
        //Add another static method multiply(a, b)
        static multiply(a, b) {
          return a * b;
        }

        //Task 3
        //Create a static property version = "1.0"
        static version = "1.0";
      }
      console.log(Calculator.version);
      console.log(Calculator.add(3, 4));
      console.log(Calculator.multiply(2, 5));

      //✔ Solution 5
      const calc = new Calculator();
      // calc.add(1, 2); // ❌ ERROR
    </script>
  </body>
